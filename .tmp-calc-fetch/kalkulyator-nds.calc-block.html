﻿<div class="wp-calc-finance" id="wp_calc_finance_0">
<input type="hidden" class="round_up_calc" value="0"/>

<h3>Рассчитайте НДС</h3>

<form name="vat_0">

<div class="wp-calc-finance-col">
<div class="wp-calc-finance-col-5">НДС</div>
<div class="wp-calc-finance-col-6">
<input type="hidden" class="inVatAction" value="1" />
<ul class="btn-switcher">
    <li class="switcher__button switcher__button--active" onclick="calc_finance_switch_btn_click(this, 1, 'inVatAction', 'wp_calc_finance_0'); calc_finance_vat('wp_calc_finance_0');">
       Выделить    </li>
    <li class="switcher__button " onclick="calc_finance_switch_btn_click(this, 2, 'inVatAction', 'wp_calc_finance_0'); calc_finance_vat('wp_calc_finance_0');">
        Начислить    </li>
</ul>

</div>
</div>

<div class="wp-calc-finance-col">
<div class="wp-calc-finance-col-5">Сумма</div>
<div class="wp-calc-finance-col-6">
	<input type="text" class="inSumm" value="10000000" onkeyup="calc_finance_cn(this)"/> сум	<div class="wp-calc-finance-slider wp-calc-finance-slider-amount" style="display: none">
		  <div class="slider-btn ui-slider-handle"></div>
	</div>
</div>
</div>

<div class="wp-calc-finance-col">
<div class="wp-calc-finance-col-5">Ставка НДС</div>
<div class="wp-calc-finance-col-6"><input type="text" class="inInterest" value="20"/> %</div>
</div>

<div class="wp-calc-finance-col">
	<div class="wp-calc-finance-col-12 buttons">

		<input type="button" value="Рассчитать" onclick="calc_finance_vat('wp_calc_finance_0');" class="calc_finance_button"/>
		<input type="reset" value="Сброс" class="calc_finance_reset_button" /> 

	</div>
</div>


<span class="result-summary">
<div class="wp-calc-finance-col">
	<div class="wp-calc-finance-col-5">Сумма с НДС</div>
	<div class="wp-calc-finance-col-6"><input type="text" class="sum result" readonly /> сум</div>
</div>
<div class="wp-calc-finance-col">
	<div class="wp-calc-finance-col-5">НДС</div>
	<div class="wp-calc-finance-col-6"><input type="text" class="vat result" readonly /> сум</div>
</div>
<div class="wp-calc-finance-col">
	<div class="wp-calc-finance-col-5">Сумма без НДС</div>
	<div class="wp-calc-finance-col-6"><input type="text" class="sumWithoutVat result" readonly /> сум</div>
</div>
</span>

</form>
</div>
